services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idea_maker}
      POSTGRES_USER: ${POSTGRES_USER:-idea_maker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idea_maker_dev_password}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-idea_maker} -d ${POSTGRES_DB:-idea_maker}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_18_data:/var/lib/postgresql

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://idea_maker:idea_maker_dev_password@db:5432/idea_maker}
      WEB_PORT: ${WEB_PORT:-5173}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/workspace
    command: uvicorn services.api.app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:${API_PORT:-8000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - web_workspace_node_modules:/workspace/apps/web/node_modules
    command: npm run --workspace apps/web dev -- --host 0.0.0.0

volumes:
  postgres_18_data:
  web_node_modules:
  web_workspace_node_modules:
